name: Deploy to Nettop via VPS Tunnel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH Deploy to Nettop
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 61234
          script: |
            echo "--- Starting Deploy on Nettop ---"
            cd /home/dima/leather_shop
            
            # 1. Затягиваем свежий код
            git pull origin main
            
            # 2. Устанавливаем зависимости (Phinx и прочее)
            # Если composer не установлен глобально, используй php composer.phar
            composer install --no-dev --no-interaction --optimize-autoloader
            
            # 3. Накатываем миграции базы данных
            # Флаг -e production берет настройки из секции production в phinx.php
            php vendor/bin/phinx migrate -e production
            
            # 4. Правим права (опционально, но полезно)
            chmod -R 755 .
            
            echo "--- All systems go! Deploy & Migrations Success! ---"