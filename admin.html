<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Вход в систему | Admin</title>
</head>
<body class="bg-[#0f0f0f] text-stone-200 flex items-center justify-center min-h-screen">
    <div class="bg-stone-900 p-10 rounded-2xl border border-stone-800 shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-serif mb-8 text-center uppercase tracking-widest text-[#c27854]">Вход для мастера</h2>
        
        <form class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-stone-500 mb-2">Логин</label>
                <input type="text" class="w-full bg-black border border-stone-800 p-3 rounded focus:border-[#c27854] outline-none transition">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-stone-500 mb-2">Пароль</label>
                <input type="password" class="w-full bg-black border border-stone-800 p-3 rounded focus:border-[#c27854] outline-none transition">
            </div>
            <button type="button" onclick="location.href='dashboard.html'" class="w-full bg-[#c27854] py-4 font-bold uppercase tracking-widest hover:bg-orange-700 transition mt-4">
                Войти
            </button>
        </form>
    </div>
</body>
</html>
